          regs.forEach(function(reg) { reg.unregister(); });

const MAX_VAL   = 1e12;   // divergence threshold

// ═══════════════════════════════════
// AI providers — three cloud (Anthropic, Gemini, Groq), "No AI", and
// user-configured local endpoints (each endpoint surfaces N model cards).
// Nothing about server URLs is hardcoded; users configure via the modal.
// ═══════════════════════════════════

const AI_STORAGE = {
  provider: 'orbit.ai.provider',
  key: (id) => `orbit.ai.key.${id}`,
  endpoints: 'orbit.ai.localEndpoints',

function getStoredProvider()        { return localStorage.getItem(AI_STORAGE.provider) || 'none'; }
function setStoredProvider(id)      { localStorage.setItem(AI_STORAGE.provider, id); }
function getStoredKey(provId)       { return localStorage.getItem(AI_STORAGE.key(provId)) || ''; }
function setStoredKey(provId, key)  {
  if (key) localStorage.setItem(AI_STORAGE.key(provId), key);
  else     localStorage.removeItem(AI_STORAGE.key(provId));
}
function getStoredLocalEndpoints() {
  try { return JSON.parse(localStorage.getItem(AI_STORAGE.endpoints) || '[]'); }
  catch { return []; }
}
function setStoredLocalEndpoints(arr) {
  localStorage.setItem(AI_STORAGE.endpoints, JSON.stringify(arr));
}

// Parse a 'local:<endpoint>:<modelId>' provider id. The endpoint may contain
// colons (e.g., 'http://host:8765'), so the modelId is everything after the LAST colon.
function parseLocalProvider(providerId) {
  if (!providerId?.startsWith('local:')) return null;
  const rest = providerId.slice('local:'.length);
  const lastColon = rest.lastIndexOf(':');
  if (lastColon < 0) return null;
  return { endpoint: rest.slice(0, lastColon).replace(/\/$/, ''), model: rest.slice(lastColon + 1) };
}

// Dispatch a chat request to the selected provider. Returns the assistant's reply text.
// Throws Error if the provider isn't usable (no provider / no key / network failure / non-2xx).
async function askAI(providerId, messages, systemPrompt) {
  if (!providerId || providerId === 'none') {
    throw new Error('No AI provider selected. Open the 🤖 AI menu to choose one.');
  }

  // Local OpenAI-compatible endpoint (user-configured URL)
  const local = parseLocalProvider(providerId);
  if (local) {
    const res = await fetch(`${local.endpoint}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: local.model,
        // Qwen3.5-4B reliably emits "Thinking Process:" preamble before the actual answer.
        // The shim strips it, but the model needs enough room to *finish* thinking and
        // emit a real response. 700 tokens often gets cut off mid-analysis.
        max_tokens: 2000,
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
      }),
    });
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`Local model error ${res.status}: ${body.slice(0, 200)}`);
    }
    const data = await res.json();
    return data?.choices?.[0]?.message?.content || '';
  }

  const key = getStoredKey(providerId);
  if (!key) throw new Error(`No API key saved for ${providerId}. Open the 🤖 AI menu to enter one.`);

  if (providerId === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: systemPrompt,
        messages: messages.map(m => ({ role: m.role, content: m.content })),
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('Invalid Anthropic key. Update it via 🤖 AI.');
      throw new Error(`Anthropic ${res.status}: ${err?.error?.message || 'error'}`);
    }
    const data = await res.json();
    return data?.content?.map(b => b.text || '').join('') || '';
  }

  if (providerId === 'gemini') {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: messages.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }],
        })),
        generationConfig: { maxOutputTokens: 600, temperature: 0.7 },
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 400 || res.status === 403) throw new Error('Invalid Gemini key. Update it via 🤖 AI.');
      throw new Error(`Gemini ${res.status}: ${err?.error?.message || 'error'}`);
    }
    const data = await res.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  if (providerId === 'groq') {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
        max_tokens: 600,
      }),
    });
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      if (res.status === 401) throw new Error('Invalid Groq key. Update it via 🤖 AI.');
      throw new Error(`Groq ${res.status}: ${body.slice(0, 200)}`);
    }
    const data = await res.json();
    return data?.choices?.[0]?.message?.content || '';
  }

  throw new Error(`Unknown provider: ${providerId}`);
}

function getChatErrorMessage(error, language) {
  if (error?.message) return error.message;
  if (language === 'es') return 'Error de red. Revisa tu conexion.';
  if (language === 'zh-Hans') return '网络错误。请检查你的连接。';
  return 'Network error. Check your connection.';
}

function interpolate(template, values) {
  return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? '');
}

function translate(language, key, values) {
  const source = TRANSLATIONS[language] || TRANSLATIONS.en;
  const fallback = TRANSLATIONS.en;
  const result = key.split('.').reduce((acc, part) => acc && acc[part], source)
    ?? key.split('.').reduce((acc, part) => acc && acc[part], fallback)
    ?? key;
  return values ? interpolate(result, values) : result;
}

function buildSystemPrompt(language) {
  const responseLanguage = RESPONSE_LANGUAGE_NAMES[language] || RESPONSE_LANGUAGE_NAMES.en;
  return `You are Athena, a math-curious thinking partner sitting beside a student who is exploring an interactive sequence-explorer app. The student is testing starting numbers under a rule of the form f(n) = n/d when n is even, or f(n) = m·n + b when n is odd. They watch the trajectory unfold as a graph and can change the parameters m, b, and d.

You only know what they tell you. You cannot see their graph, parameters, or which starts they've tried — so when they ask vague questions, gently ask them to describe what they're noticing first.

Your way is to wonder alongside them. You ask one short question at a time, two or three sentences total. You never compute a sequence yourself; the app does that instantly. You never predict an outcome; you invite them to test it and report back. If they push you to "just tell me," you decline kindly and point them toward an experiment they could run. You never mention Collatz by name — let them find it.

Respond in ${responseLanguage}.`;
}

function formatValue(value) {
  return Number.isFinite(value) ? value.toLocaleString() : String(value);
}

// Memoized primality test (trial division) — used by the "Color primes" View option.
const _primeCache = new Map();
function isPrime(n) {
  if (!Number.isInteger(n) || n < 2) return false;
  const cached = _primeCache.get(n);
  if (cached !== undefined) return cached;
  let result = true;
  if (n % 2 === 0) result = (n === 2);
  else {
    for (let i = 3; i * i <= n; i += 2) { if (n % i === 0) { result = false; break; } }
  }
  _primeCache.set(n, result);
  return result;
}

function measureSegmentWidth(ctx, text) {
  return ctx.measureText(text).width;
}

function drawCenteredSegments(ctx, centerX, y, segments) {
  const totalWidth = segments.reduce((sum, segment) => sum + measureSegmentWidth(ctx, segment.text), 0);
  let cursorX = centerX - totalWidth / 2;
  for (const segment of segments) {
    ctx.fillStyle = segment.color;
    ctx.fillText(segment.text, cursorX, y);
    cursorX += measureSegmentWidth(ctx, segment.text);
  }
}

function getSegmentsWidth(ctx, segments) {
  return segments.reduce((sum, segment) => sum + measureSegmentWidth(ctx, segment.text), 0);
}

function drawFormulaLine(ctx, centerX, y, equationSegments, annotation, annotationColor, gap) {
  const equationWidth = getSegmentsWidth(ctx, equationSegments);
  const annotationWidth = measureSegmentWidth(ctx, annotation);
  const totalWidth = equationWidth + gap + annotationWidth;
  let cursorX = centerX - totalWidth / 2;

  for (const segment of equationSegments) {
    ctx.fillStyle = segment.color;
    ctx.fillText(segment.text, cursorX, y);
    cursorX += measureSegmentWidth(ctx, segment.text);
  }

  cursorX += gap;
  ctx.fillStyle = annotationColor;
  ctx.fillText(annotation, cursorX, y);
}

function clampNodePosition(value, radius, max) {
  return Math.max(radius + 2, Math.min(max - radius - 2, value));
}

function getNodeRadius(position, startNodes, now) {
  const elapsed  = (now - position.birthTime) / 1000;
  const popScale = 1 + 2.2 * Math.exp(-elapsed * 2.8);
  const baseR    = startNodes.has(position.value) ? START_R : NODE_R;
  return baseR * popScale;
}

function findNodeAt(nodes, startNodes, x, y, now) {
  const entries = [...nodes.entries()].reverse();
  for (const [value, position] of entries) {
    position.value = value;
    const radius = getNodeRadius(position, startNodes, now);
    const dx = x - position.x;
    const dy = y - position.y;
    if (dx * dx + dy * dy <= radius * radius) {
      return { value, position, radius };
    }
  }
  return null;
}

function normalizeIntegerInput(value) {
  return String(value ?? '').replace(/[,_\s]/g, '');
}

function parseSingleStartInput(rawValue) {
  const normalized = normalizeIntegerInput(rawValue);
  if (!normalized) return { kind: 'empty' };
  if (!/^\d+$/.test(normalized)) return { kind: 'invalid' };

  const value = Number(normalized);
  if (!Number.isSafeInteger(value)) return { kind: 'unsafe', value };
  if (value <= 0) return { kind: 'invalid' };
  if (value > RELIABLE_START_LIMIT) return { kind: 'above-limit', value };

  return { kind: 'ok', value };
}

function getStartLimitWarning(rawValue, language) {
  const parsed = parseSingleStartInput(rawValue);
  if (parsed.kind === 'above-limit') {
    return translate(language, 'startLimitAbove', { limit: formatValue(RELIABLE_START_LIMIT) });
  }
  if (parsed.kind === 'unsafe') {
    return translate(language, 'startLimitUnsafe');
  }
  return '';
}

// ── Sequence computation ──────────────────────────────────────────────────────
function computeSeq(start, m, a, d) {
  const seq    = [start];
  const seen   = new Map([[start, 0]]);
  let n = start;
  let maxValue = start;

  for (let i = 0; i < MAX_ITER; i++) {
    let next;
    if (n % 2 === 0) {
      next = n / d;
    } else {
      next = m * n + a;
    }
    maxValue = Math.max(maxValue, next);
    if (!Number.isInteger(next) || next <= 0)
      return { seq, outcome: 'noninteger', cycleAt: -1, maxValue };
    if (next > MAX_VAL) {
      seq.push(next);
      return { seq, outcome: 'diverge', cycleAt: -1, maxValue };
    }
    seq.push(next);
    if (seen.has(next)) {
      const cycleAt = seen.get(next);
      return { seq, outcome: next === 1 ? 'converge' : 'cycle', cycleAt, maxValue };
    }
    seen.set(next, seq.length - 1);
    n = next;
  }
  return { seq, outcome: 'timeout', cycleAt: -1, maxValue };
}

// ── Color by log(value) ──────────────────────────────────────────────────────
function valColor(v) {
  const t = Math.min(1, Math.log10(Math.max(1, Math.abs(v))) / 3.5);
  const stops = [
    [0,   [90,  210, 120]],
    [0.3, [180, 215,  55]],
    [0.6, [250, 145,  25]],
    [1.0, [235,  45,  45]],
  ];
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const s = (t - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      const c = stops[i-1][1].map((x, j) => Math.round(x + s * (stops[i][1][j] - x)));
      return `rgb(${c[0]},${c[1]},${c[2]})`;
    }
  }
  return 'rgb(235,45,45)';
}

// ── Force-directed physics ───────────────────────────────────────────────────
function physicsStep(nodes, edges, W, H) {
  const vals = [...nodes.keys()];
  const fx = {}, fy = {};
  for (const v of vals) { fx[v] = 0; fy[v] = 0; }

  // Repulsion between all node pairs
  for (let i = 0; i < vals.length; i++) {
    for (let j = i + 1; j < vals.length; j++) {
      const a = nodes.get(vals[i]), b = nodes.get(vals[j]);
      const dx = a.x - b.x, dy = a.y - b.y;
      const d2 = dx * dx + dy * dy + 1;
      const f  = 5000 / d2;
      const d  = Math.sqrt(d2);
      fx[vals[i]] += f * dx / d;  fy[vals[i]] += f * dy / d;
      fx[vals[j]] -= f * dx / d;  fy[vals[j]] -= f * dy / d;
    }
  }

  // Spring attraction along edges
  const L0 = 85; // natural spring length
  for (const { from, to } of edges) {
    if (!nodes.has(from) || !nodes.has(to)) continue;
    const nf = nodes.get(from), nt = nodes.get(to);
    const dx = nt.x - nf.x, dy = nt.y - nf.y;
    const d  = Math.sqrt(dx * dx + dy * dy) + 0.1;
    const f  = 0.05 * (d - L0);
    fx[from] += f * dx / d;  fy[from] += f * dy / d;
    fx[to]   -= f * dx / d;  fy[to]   -= f * dy / d;
  }

  // Gentle gravity toward center
  for (const v of vals) {
    const n = nodes.get(v);
    fx[v] += 0.018 * (W / 2 - n.x);
    fy[v] += 0.018 * (H / 2 - n.y);
  }

  // Euler integration with damping
  const damp = 0.83;
  for (const v of vals) {
    const n  = nodes.get(v);
    if (n.pinned || n.dragging) {
      n.vx = 0;
      n.vy = 0;
      n.x = clampNodePosition(n.x, NODE_R, W);
      n.y = clampNodePosition(n.y, NODE_R, H);
      continue;
    }
    n.vx = (n.vx + fx[v]) * damp;
    n.vy = (n.vy + fy[v]) * damp;
    n.x  = Math.max(NODE_R + 2, Math.min(W - NODE_R - 2, n.x + n.vx));
    n.y  = Math.max(NODE_R + 2, Math.min(H - NODE_R - 2, n.y + n.vy));
  }
}

// ── Cycle Layout ─────────────────────────────────────────────────────────────
// Walk a single cycle in trajectory order: start at the cycle's entry point and follow
// the unique outgoing edge that stays inside the cycle until it loops back.
function walkCycle(cycleVals, cycleNodes, edges) {
  if (cycleVals.length === 0) return [];
  const next = new Map();
  for (const e of edges) {
    if (cycleNodes.has(e.from) && cycleNodes.has(e.to) && !next.has(e.from)) next.set(e.from, e.to);
  }
  const order = [];
  const seen = new Set();
  let cur = cycleVals[0]; // cyclesRef is built in trajectory order, so [0] is the cycle's entry point
  while (cur !== undefined && !seen.has(cur)) { order.push(cur); seen.add(cur); cur = next.get(cur); }
  for (const v of cycleVals) if (!seen.has(v)) order.push(v); // safety net (shouldn't happen)
  return order;
}

// Cycle-layout modes. The cycle's N values are placed around a circle; the modes differ only
// in the ordering/grouping of those points. Path-to-cycle nodes go in a grid below the circle.
// The trajectory edges are drawn elsewhere, so they trace the circle's perimeter (Polygon) or
// criss-cross the interior (Sorted / Parity-split).
function applyCycleLayout(nodes, edges, cycleNodes, W, H, mode = 'polygon') {
  const cx = W / 2;
  const cycleVals = [...cycleNodes].filter(v => nodes.has(v));
  const nonCycleVals = [...nodes.keys()].filter(v => !cycleNodes.has(v));

  let cycleBottomY = 90; // y just below the cycle circle (where the path grid starts)
  if (cycleVals.length > 0) {
    const N = cycleVals.length;
    const radius = Math.max(70, Math.min(Math.min(W, H) * 0.34, 26 + N * 22));
    const cyCenterY = 90 + radius; // circle top ~y=90

    if (mode === 'parity') {
      const odds  = cycleVals.filter(v => v % 2 !== 0).sort((a, b) => a - b);
      const evens = cycleVals.filter(v => v % 2 === 0).sort((a, b) => a - b);
      // odds along the top half (θ: π→0, i.e. 9 o'clock through 12 to 3); evens along the bottom (π→2π).
      const placeArc = (vals, t0, t1) => vals.forEach((v, i) => {
        const node = nodes.get(v); if (!node) return;
        const t = vals.length === 1 ? (t0 + t1) / 2 : t0 + (t1 - t0) * (i + 1) / (vals.length + 1);
        node.x = cx + radius * Math.cos(t);
        node.y = cyCenterY - radius * Math.sin(t);
        node.vx = 0; node.vy = 0;
      });
      placeArc(odds, Math.PI, 0);
      placeArc(evens, Math.PI, 2 * Math.PI);
    } else {
      const order = (mode === 'sorted') ? [...cycleVals].sort((a, b) => a - b) : walkCycle(cycleVals, cycleNodes, edges);
      order.forEach((v, i) => {
        const node = nodes.get(v); if (!node) return;
        const t = Math.PI / 2 - (i / order.length) * 2 * Math.PI; // start at 12 o'clock, go clockwise
        node.x = cx + radius * Math.cos(t);
        node.y = cyCenterY - radius * Math.sin(t);
        node.vx = 0; node.vy = 0;
      });
    }
    cycleBottomY = cyCenterY + radius + 50;
  }

  // Path-to-cycle (non-cycle) nodes — a compact grid below the circle.
  if (nonCycleVals.length > 0) {
    const cols = Math.max(1, Math.ceil(Math.sqrt(nonCycleVals.length)));
    const spacing = Math.min(95, Math.max(60, (W - 120) / cols));
    const startY = (cycleVals.length > 0) ? cycleBottomY : 110;
    nonCycleVals.forEach((v, i) => {
      const node = nodes.get(v); if (!node) return;
      const row = Math.floor(i / cols), col = i % cols;
      node.x = cx - ((cols - 1) * spacing) / 2 + col * spacing;
      node.y = startY + row * spacing;
      node.vx = 0; node.vy = 0;
    });
  }

  // Vertically center the whole arrangement in the canvas.
  let minY = Infinity, maxY = -Infinity;
  for (const node of nodes.values()) {
    if (node.y < minY) minY = node.y;
    if (node.y > maxY) maxY = node.y;
  }
  if (Number.isFinite(minY)) {
    const dy = H / 2 - (minY + maxY) / 2;
    for (const node of nodes.values()) node.y += dy;
  }
}

// ── Canvas rendering ─────────────────────────────────────────────────────────
function drawGraph(canvas, nodes, edges, cycleNodes, startNodes, now, m, a, d, hoveredNode, theme, showGrid, view = { scale: 1, x: 0, y: 0 }, language = 'en', opts = {}) {
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const { showStepNumbers = false, parityColoring = false, colorPrimes = false, stepIndex = null } = opts;
  const PARITY_ODD = '#e67e22', PARITY_EVEN = '#3498db'; // View menu: parity coloring (CVD-safe orange/blue)
  const PRIME_COLOR = '#e040fb'; // View menu: prime highlight (magenta — distinct from gradient/parity)

  // Background
  ctx.fillStyle = theme.canvasBg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  if (showGrid) {
    ctx.strokeStyle = theme.canvasGrid;
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  }

  // Formula watermark — a single line along the bottom border, behind the graph
  const sign = a >= 0 ? '+' : '−';
  const annotationColor = theme.canvasAnnotation;
  const formula = [
    { text: 'f(n) = n / ', color: theme.canvasWatermark },
    { text: String(d), color: PARAM_COLORS.d },
    { text: '  ' + translate(language, 'nEven') + '       |       ', color: annotationColor },
    { text: 'f(n) = ', color: theme.canvasWatermark },
    { text: String(m), color: PARAM_COLORS.m },
    { text: 'n ', color: theme.canvasWatermark },
    { text: sign, color: theme.canvasWatermark },
    { text: ' ', color: theme.canvasWatermark },
    { text: String(Math.abs(a)), color: PARAM_COLORS.a },
    { text: '  ' + translate(language, 'nOdd'), color: annotationColor },
  ];
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  // Keep clear of the zoom controls in the bottom-left corner: only use the space to their right.
  const leftReserve = 340;
  const maxFormulaWidth = Math.max(200, W - leftReserve - 20);
  let formulaSize = Math.min(Math.round(W / 42), 22);
  while (formulaSize > 11) {
    ctx.font = `bold ${formulaSize}px monospace`;
    if (getSegmentsWidth(ctx, formula) <= maxFormulaWidth) break;
    formulaSize -= 1;
  }
  ctx.font = `bold ${formulaSize}px monospace`;
  drawCenteredSegments(ctx, (leftReserve + (W - 20)) / 2, H - 12, formula);
  ctx.restore();

  // ── Zoom/pan transform — everything below (edges, nodes, cycle layout) is in
  //    world coordinates; the view transform maps world → screen (Revision 6). ──
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.scale, view.scale);

  // Detect bidirectional cycle edges
  const bidirectional = new Set();
  for (const { from, to } of edges) {
    if (cycleNodes.has(from) && cycleNodes.has(to)) {
      const reverse = edges.find(e => e.from === to && e.to === from);
      if (reverse) {
        const key = from < to ? `${from}-${to}` : `${to}-${from}`;
        bidirectional.add(key);
      }
    }
  }

  // Edges with arrowheads
  const drawnBidirectional = new Set();
  for (const { from, to } of edges) {
    const nf = nodes.get(from), nt = nodes.get(to);
    if (!nf || !nt) continue;
    
    // Check if this is a bidirectional cycle edge
    const isBidirectional = cycleNodes.has(from) && cycleNodes.has(to) && 
                            bidirectional.has(from < to ? `${from}-${to}` : `${to}-${from}`);
    
    if (isBidirectional) {
      const key = from < to ? `${from}-${to}` : `${to}-${from}`;
      if (drawnBidirectional.has(key)) continue; // Already drew this pair
      drawnBidirectional.add(key);
      
      // Draw multiple curved arrows back and forth to show infinite cycle
      const dx = nt.x - nf.x, dy = nt.y - nf.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) continue;
      
      // Perpendicular offset for curve
      const perpX = -dy / dist;
      const perpY = dx / dist;
      
      // Draw 3 sets of bidirectional curved arrows
      for (let i = 0; i < 3; i++) {
        const curve = 25 + i * 8; // Increasing curve amount
        const alpha = 1 - i * 0.25; // Fade out outer arrows
        
        // Forward arrow (from -> to)
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        const midX1 = (nf.x + nt.x) / 2 + perpX * curve;
        const midY1 = (nf.y + nt.y) / 2 + perpY * curve;
        ctx.moveTo(nf.x, nf.y);
        ctx.quadraticCurveTo(midX1, midY1, nt.x, nt.y);
        ctx.strokeStyle = '#ffcc33'; // Yellow for cycle
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Arrowhead at midpoint pointing to target
        const t = 0.7;
        const qx = (1-t)*(1-t)*nf.x + 2*(1-t)*t*midX1 + t*t*nt.x;
        const qy = (1-t)*(1-t)*nf.y + 2*(1-t)*t*midY1 + t*t*nt.y;
        const tx = 2*(1-t)*(midX1-nf.x) + 2*t*(nt.x-midX1);
        const ty = 2*(1-t)*(midY1-nf.y) + 2*t*(nt.y-midY1);
        const angle1 = Math.atan2(ty, tx);
        ctx.beginPath();
        ctx.moveTo(qx, qy);
        ctx.lineTo(qx - 8 * Math.cos(angle1 - 0.4), qy - 8 * Math.sin(angle1 - 0.4));
        ctx.lineTo(qx - 8 * Math.cos(angle1 + 0.4), qy - 8 * Math.sin(angle1 + 0.4));
        ctx.closePath();
        ctx.fillStyle = '#ffcc33';
        ctx.fill();
        
        // Backward arrow (to -> from)
        ctx.beginPath();
        const midX2 = (nf.x + nt.x) / 2 - perpX * curve;
        const midY2 = (nf.y + nt.y) / 2 - perpY * curve;
        ctx.moveTo(nt.x, nt.y);
        ctx.quadraticCurveTo(midX2, midY2, nf.x, nf.y);
        ctx.strokeStyle = '#ffcc33';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Arrowhead at midpoint pointing back to source
        const qx2 = (1-t)*(1-t)*nt.x + 2*(1-t)*t*midX2 + t*t*nf.x;
        const qy2 = (1-t)*(1-t)*nt.y + 2*(1-t)*t*midY2 + t*t*nf.y;
        const tx2 = 2*(1-t)*(midX2-nt.x) + 2*t*(nf.x-midX2);
        const ty2 = 2*(1-t)*(midY2-nt.y) + 2*t*(nf.y-midY2);
        const angle2 = Math.atan2(ty2, tx2);
        ctx.beginPath();
        ctx.moveTo(qx2, qy2);
        ctx.lineTo(qx2 - 8 * Math.cos(angle2 - 0.4), qy2 - 8 * Math.sin(angle2 - 0.4));
        ctx.lineTo(qx2 - 8 * Math.cos(angle2 + 0.4), qy2 - 8 * Math.sin(angle2 + 0.4));
        ctx.closePath();
        ctx.fillStyle = '#ffcc33';
        ctx.fill();
        ctx.restore();
      }
      continue;
    }
    
    // Regular one-way edge
    const dx = nt.x - nf.x, dy = nt.y - nf.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) continue;

    const toR = (startNodes.has(to) ? START_R : NODE_R) + 5;
    const ex = nt.x - (dx / dist) * toR;
    const ey = nt.y - (dy / dist) * toR;

    ctx.beginPath();
    ctx.moveTo(nf.x, nf.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = theme.canvasEdge;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Arrowhead
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - 9 * Math.cos(angle - 0.45), ey - 9 * Math.sin(angle - 0.45));
    ctx.lineTo(ex - 9 * Math.cos(angle + 0.45), ey - 9 * Math.sin(angle + 0.45));
    ctx.closePath();
    ctx.fillStyle = theme.canvasEdgeHead;
    ctx.fill();
  }

  // Nodes
  for (const [val, pos] of nodes) {
    const isCycle  = cycleNodes.has(val);
    const isStart  = startNodes.has(val);
    const isPinned = !!pos.pinned;
    const isDragging = !!pos.dragging;

    // Pop-in scale: new nodes spawn large and shrink to normal over ~1s
    const elapsed  = (now - pos.birthTime) / 1000;
    const popScale = 1 + 2.2 * Math.exp(-elapsed * 2.8);
    
    // Breathing animation for start nodes (gentle pulse)
    const breathe = isStart ? 1 + 0.08 * Math.sin(now / 800) : 1;
    
    const baseR    = isStart ? START_R : NODE_R;
    const r        = baseR * popScale * breathe;

    // Glow for cycle nodes (and starting nodes)
    if (isCycle || isStart) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + (isStart ? 8 : 6), 0, Math.PI * 2);
      ctx.fillStyle = isStart
        ? 'rgba(160, 100, 220, 0.25)'
        : 'rgba(255, 215, 50, 0.18)';
      ctx.fill();
    }

    // (no hover highlight — clicking shows a tooltip instead)

    // Node circle (fill precedence: seed → prime (if "Color primes") → parity (if "Parity coloring") → value gradient)
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isStart ? '#9b5fc0'
                  : (colorPrimes && isPrime(val)) ? PRIME_COLOR
                  : parityColoring ? (val % 2 === 0 ? PARITY_EVEN : PARITY_ODD)
                  : valColor(val);
    ctx.fill();
    ctx.strokeStyle = isDragging ? 'rgba(255,255,255,0.98)'
            : isPinned  ? 'rgba(170,230,255,0.98)'
            : isCycle   ? 'rgba(255,215,50,0.9)'
            : isStart   ? 'rgba(180,130,230,0.95)'
            : 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = isDragging ? 3.5 : (isPinned || isCycle || isStart) ? 2.5 : 1;
    ctx.stroke();

    // Label — scale font with node size
    const label = val > 9999 ? String(val).slice(0, 4) + '…' : String(val);
    const fs    = Math.max(8, Math.min(14, Math.round(r * 0.75)));
    ctx.fillStyle    = 'black';
    ctx.font         = `bold ${fs}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, pos.x, pos.y);

    // Step-index badge (View menu: "Show step numbers") — small bubble at the node's upper-right
    if (showStepNumbers && stepIndex && stepIndex.has(val)) {
      const si = stepIndex.get(val);
      const br = Math.max(8, r * 0.5);
      const bx = pos.x + r * 0.78, by = pos.y - r * 0.78;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = theme.panelBg;
      ctx.fill();
      ctx.strokeStyle = theme.borderStrong;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = theme.textPrimary;
      ctx.font = `bold ${Math.max(8, Math.round(br * 1.05))}px monospace`;
      ctx.fillText(String(si), bx, by);
    }
  }

  ctx.restore(); // end zoom/pan transform
}

// ── Outcome badge ────────────────────────────────────────────────────────────
const OUTCOME_COLOR = {
  converge:   '#55dd77',
  cycle:      '#ffcc33',
  diverge:    '#ff7755',
  noninteger: '#9999aa',
  timeout:    '#9999aa',
};
const OUTCOME_LABEL = {
  converge:   'converges → 1',
  cycle:      'enters cycle',
  diverge:    'diverges',
  noninteger: 'non-integer',
  timeout:    'timed out',
};

  const startNodesRef = useRef(new Set());
  const sequencesRef = useRef([]); // Store all explored sequences for step filtering

  const dragStateRef = useRef(null);

  const viewRef = useRef({ scale: 1, x: 0, y: 0 }); // canvas zoom/pan transform — source of truth, read by the draw loop

  }));

  const t = (key, values) => translate(language, key, values);

    { role: 'assistant', content: translate(language, 'chatGreeting') }
  ]);
  const [chatInput,   setChatInput]   = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const chatEndRef = useRef(null);
  // Probe each user-configured local endpoint for OpenAI-compatible /v1/models.
  // Anything that responds becomes a stack of cards in the AI modal.
  useEffect(() => {
    if (!localEndpoints.length) { setLocalModelsByEndpoint({}); return; }
    const ctrls = [];
    localEndpoints.forEach(url => {
      const clean = url.replace(/\/$/, '');
      const ctrl = new AbortController();
      ctrls.push(ctrl);
      const t = setTimeout(() => ctrl.abort(), 2500);
      fetch(`${clean}/v1/models`, { signal: ctrl.signal })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data?.data) return;
          const models = data.data.filter(m => m?.id).map(m => ({ id: m.id, label: m.id }));
          setLocalModelsByEndpoint(prev => ({ ...prev, [url]: models }));
        })
        .catch(() => {
          setLocalModelsByEndpoint(prev => ({ ...prev, [url]: [] }));   // mark as probed but empty
        })
        .finally(() => clearTimeout(t));
    });
    return () => ctrls.forEach(c => c.abort());
  }, [localEndpoints]);

  const clampDataTableRect = (rect, viewportWidth = window.innerWidth, viewportHeight = window.innerHeight) => {
    const minWidth = 540;
    const minHeight = 320;
    const maxWidth = Math.max(minWidth, viewportWidth - 24);
    const maxHeight = Math.max(minHeight, viewportHeight - 24);
    const width = Math.min(Math.max(rect.width, minWidth), maxWidth);
    const height = Math.min(Math.max(rect.height, minHeight), maxHeight);
    const left = Math.min(Math.max(rect.left, 12), Math.max(12, viewportWidth - width - 12));
    const top = Math.min(Math.max(rect.top, 12), Math.max(12, viewportHeight - height - 12));
    return { top, left, width, height };
  };

  const clampChatPanelWidth = (width, viewportWidth = window.innerWidth) => {
    // Keep enough space for canvas + data grids while allowing wider chat screenshots.
    const reservedForCanvasAndGrid = 640;
    const dynamicMax = Math.max(CHAT_PANEL_MIN_WIDTH, Math.min(CHAT_PANEL_MAX_WIDTH, viewportWidth - reservedForCanvasAndGrid));
    return Math.min(Math.max(width, CHAT_PANEL_MIN_WIDTH), dynamicMax);
  };

  const startDataTableDrag = (event) => {
    const target = event.target;
    if (target.closest('button')) return;
    event.preventDefault();
    dataTableDragRef.current = {
      pointerId: event.pointerId,
      offsetX: event.clientX - dataTableRect.left,
      offsetY: event.clientY - dataTableRect.top,

  };

  const startChatResize = (event) => {
    event.preventDefault();
    if (event.currentTarget?.setPointerCapture) {
      event.currentTarget.setPointerCapture(event.pointerId);
    }
    chatResizeRef.current = {
      pointerId: event.pointerId,
    };
  };

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [chatMessages]);

  useEffect(() => {
    const handlePointerMove = (event) => {
      if (dataTableDragRef.current && event.pointerId === dataTableDragRef.current.pointerId) {
        const { offsetX, offsetY } = dataTableDragRef.current;

    window.addEventListener('pointerup', handlePointerUp);
    window.addEventListener('resize', handleWindowResize);

  const playClickSound = () => {
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800; // Higher frequency for a click sound
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.05);
      
      // Clean up
      setTimeout(() => audioContext.close(), 100);
    } catch (e) {
      // Silently fail if audio context not available
    }
  };

  function rebuildGraphFromSequences() {
    const cvs = canvasRef.current;
    const W = cvs?.width  ?? 900;
    const H = cvs?.height ?? 560;
    
    // Clear existing nodes and edges
    const existingPositions = new Map(nodesRef.current);
    nodesRef.current = new Map();
    edgesRef.current = [];
    cyclesRef.current = new Set();
    startNodesRef.current = new Set();
    const stepMap = new Map(); // value → first step index in the displayed trajectory (for the View menu's step badges)

    const now = Date.now();

    // Rebuild from stored sequences
    for (const seqData of sequencesRef.current) {
      const { seq, outcome, cycleAt, startVal } = seqData;

      // Extend sequence if it enters a cycle and maxVisibleSteps > seq.length
      let extendedSeq = [...seq];
      if ((outcome === 'cycle' || outcome === 'converge') && cycleAt >= 0 && maxVisibleSteps > seq.length) {
        const cycle = seq.slice(cycleAt);
        const needed = maxVisibleSteps - seq.length;
        for (let i = 0; i < needed; i++) {
          extendedSeq.push(cycle[i % cycle.length]);
        }
      }

      const limited = extendedSeq.slice(0, Math.min(maxVisibleSteps, MAX_NODES));
      for (let i = 0; i < limited.length; i++) {
        if (!stepMap.has(limited[i])) stepMap.set(limited[i], i);
      }

      // Mark start node
      startNodesRef.current.add(startVal);
      
      // Add nodes (preserving positions if they exist)
      for (const v of limited) {
        if (!nodesRef.current.has(v)) {
          const existing = existingPositions.get(v);
          nodesRef.current.set(v, existing || {
            x:  W / 2 + (Math.random() - 0.5) * 250,
            y:  H / 2 + (Math.random() - 0.5) * 250,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            birthTime: now,
            pinned: false,
            dragging: false,
          });
        }
      }
      
      // Add edges (avoid duplicates)
      const edgeSet = new Set(edgesRef.current.map(e => `${e.from}:${e.to}`));
      for (let i = 0; i < limited.length - 1; i++) {
        const key = `${limited[i]}:${limited[i + 1]}`;
        if (!edgeSet.has(key)) {
          edgesRef.current.push({ from: limited[i], to: limited[i + 1] });
          edgeSet.add(key);
        }
      }
      
      // Mark cycle nodes
      if ((outcome === 'cycle' || outcome === 'converge') && cycleAt >= 0) {
        for (let i = cycleAt; i < Math.min(extendedSeq.length, maxVisibleSteps); i++) {
          cyclesRef.current.add(extendedSeq[i]);
        }
      }
    }
    stepIndexRef.current = stepMap;
  }

  // ── Zoom / pan (Revision 6) ──────────────────────────────────────────────────
  // Node positions and edges live in "world" coordinates ([0..canvasW]×[0..canvasH]);
  // viewRef.current = { scale, x, y } maps world → screen: screen = world*scale + (x,y).
  function screenToWorld(p) {
    const v = viewRef.current;
    return { x: (p.x - v.x) / v.scale, y: (p.y - v.y) / v.scale };
  }

  function cancelAutoFit() {

  function resetView() {

  // Bounding box of the current node positions (in world coords), padded by `pad`.
  function nodesBBox(pad = 0) {
    const nodes = nodesRef.current;
    if (!nodes || nodes.size === 0) return null;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const pos of nodes.values()) {
      if (pos.x - pad < minX) minX = pos.x - pad;
      if (pos.x + pad > maxX) maxX = pos.x + pad;
      if (pos.y - pad < minY) minY = pos.y - pad;
      if (pos.y + pad > maxY) maxY = pos.y + pad;
    }
    return { minX, minY, maxX, maxY };
  }

  // Screen-coords of the graph's center — used as the zoom anchor so zooming
  // just scales the graph in place rather than chasing the cursor.
  function graphAnchor() {
    const cvs = canvasRef.current;
    const W = cvs?.width ?? 900, H = cvs?.height ?? 560;
    const b = nodesBBox();
    if (!b) return { x: W / 2, y: H / 2 };
    const v = viewRef.current;
    const cx = (b.minX + b.maxX) / 2, cy = (b.minY + b.maxY) / 2;
    return { x: cx * v.scale + v.x, y: cy * v.scale + v.y };
  }

  // Zoom keeping the given screen point fixed (used by wheel — anchored on the graph center).
  function zoomAround(screenX, screenY, factor) {
    cancelAutoFit();
    const v = viewRef.current;
    const newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, v.scale * factor));
    const wx = (screenX - v.x) / v.scale;
    const wy = (screenY - v.y) / v.scale;
    viewRef.current = { scale: newScale, x: screenX - wx * newScale, y: screenY - wy * newScale };
    setZoomPct(Math.round(newScale * 100));
  }

  // Zoom by a factor, anchored on the graph's center (so the graph grows/shrinks in place).
  function zoomCentered(factor) {
    const a = graphAnchor();
    zoomAround(a.x, a.y, factor);
  }

  function fitToCanvas() {
    cancelAutoFit();
    const cvs = canvasRef.current;
    if (!cvs) return;
    const W = cvs.width || 900, H = cvs.height || 560;
    const b = nodesBBox(START_R + 8);
    if (!b) { resetView(); return; }
    const bw = Math.max(1, b.maxX - b.minX), bh = Math.max(1, b.maxY - b.minY);
    // ~8% margin; don't over-zoom a small graph (cap the fit zoom-in at 2.5×)
    const scale = Math.max(MIN_ZOOM, Math.min(2.5, MAX_ZOOM, Math.min(W / bw, H / bh) * 0.92));
    const cx = (b.minX + b.maxX) / 2, cy = (b.minY + b.maxY) / 2;
    viewRef.current = { scale, x: W / 2 - cx * scale, y: H / 2 - cy * scale };
    setZoomPct(Math.round(scale * 100));
  }

  // After a layout change (new seed / Show Cycles toggle / startup), wait for the
  // layout to settle, then auto-fit — unless the user has zoomed/panned in the meantime.
  // Debounced: rapid changes only fit once, for the last one.
  function scheduleAutoFit(delay = 1400) {
    if (fitTimerRef.current) clearTimeout(fitTimerRef.current);
    fitTimerRef.current = setTimeout(() => {
      fitTimerRef.current = null;
      const v = viewRef.current;
      if (v.scale === 1 && v.x === 0 && v.y === 0) fitToCanvas();
    }, delay);
  }

  function handleCanvasPointerDown(event) {
    const point = getCanvasPoint(event);
    if (!point) return;
    cancelAutoFit(); // touching the canvas (drag/pan) means the user is steering the view now
    const w = screenToWorld(point);
    const hit = findNodeAt(nodesRef.current, startNodesRef.current, w.x, w.y, Date.now());
    if (hit) {
      const { value, position, radius } = hit;
      position.dragging = true;
      position.pinned = true;
      position.vx = 0;
      position.vy = 0;
      dragStateRef.current = {
        value,
        pointerId: event.pointerId,
        offsetX: w.x - position.x,
        offsetY: w.y - position.y,
        radius,
      };
      setIsDraggingNode(true);
      event.currentTarget.setPointerCapture(event.pointerId);
      event.preventDefault();
      return;
    }
    // Nothing under the cursor → pan the view.
    const v = viewRef.current;
    panRef.current = { pointerId: event.pointerId, sx: event.clientX, sy: event.clientY, vx: v.x, vy: v.y };
    event.currentTarget.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  function handleCanvasPointerMove(event) {
    const drag = dragStateRef.current;
    if (drag && drag.pointerId === event.pointerId) {
      const point = getCanvasPoint(event);
      const canvas = canvasRef.current;
      const position = nodesRef.current.get(drag.value);
      if (!point || !canvas || !position) return;
      const w = screenToWorld(point);
      position.x = clampNodePosition(w.x - drag.offsetX, NODE_R, canvas.width);
      position.y = clampNodePosition(w.y - drag.offsetY, NODE_R, canvas.height);
      position.vx = 0;
      position.vy = 0;
      return;
    }
    const pan = panRef.current;
    if (pan && pan.pointerId === event.pointerId) {
      viewRef.current.x = pan.vx + (event.clientX - pan.sx);
      viewRef.current.y = pan.vy + (event.clientY - pan.sy);
    }
  }

  function releaseDraggedNode(pointerId) {
    const drag = dragStateRef.current;
    if (drag && drag.pointerId === pointerId) {
      const position = nodesRef.current.get(drag.value);
      if (position) {
        position.dragging = false;
        position.pinned = true;
        position.vx = 0;
        position.vy = 0;
      }
      dragStateRef.current = null;
      setIsDraggingNode(false);
    }
    if (panRef.current && panRef.current.pointerId === pointerId) {
      panRef.current = null;
    }
  }

  function handleCanvasPointerUp(event) {
    releaseDraggedNode(event.pointerId);
    if (event.currentTarget.hasPointerCapture(event.pointerId)) {
      event.currentTarget.releasePointerCapture(event.pointerId);
    }
  }

  function handleCanvasPointerCancel(event) {
    releaseDraggedNode(event.pointerId);
    if (event.currentTarget.hasPointerCapture(event.pointerId)) {
      event.currentTarget.releasePointerCapture(event.pointerId);
    }
  }

  function addNumberVal(val) {
    if (isNaN(val) || val <= 0 || val > MAX_START) return;
    // Revision 4: a new seed replaces the previous trajectory on the canvas
    // (no more overlay — the Cases tool handles persistent comparison).
    maybeNudgeSave();
    clearGraph();
    focusGridOnValue(val);
    const { m, a, d } = paramsRef.current;
    const { seq, outcome, cycleAt, maxValue } = computeSeq(val, m, a, d);

    // Store the sequence for later filtering/extending
    sequencesRef.current.push({ seq, outcome, cycleAt, maxValue, startVal: val, m, a, d });

    // Rebuild graph with current step limit
    rebuildGraphFromSequences();

    if (outcome === 'diverge') {
      setOverflow({ start: val, steps: seq.length - 1, maxValue });
    }

    setLog(prev =>
      [{ start: val, outcome, steps: seq.length - 1, maxValue, m, a, d }, ...prev].slice(0, 20)
    );
    setVisitedNums(prev => {
      const next = new Set(prev);
      for (const v of seq) {
        if (Number.isSafeInteger(v) && v >= 1 && v <= MAX_VAL) next.add(v);
      }
      return next;
    });
    // Once the force layout settles, fit the new trajectory to the canvas.
    scheduleAutoFit();
  }

  function addNumber() {
    const parsed = parseSingleStartInput(inputVal);
    if (parsed.kind === 'empty') {
      // Blank seed + Enter = a full reset (clears the canvas, the grid highlights, and the zoom/pan).
      maybeNudgeSave();
      reset();
      setInputWarning('');
      return;

    if (parsed.kind !== 'ok') {
      setInputWarning(getStartLimitWarning(inputVal, language) || t('startLimitInvalid'));
      return;
    }
    const val = parsed.value;
    setInputWarning('');
    setInputVal('');
    addNumberVal(val);
  }

  function handleInputChange(e) {

    setInputVal(nextValue);
    setInputWarning(getStartLimitWarning(nextValue, language));
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  const sign    = a >= 0 ? '+' : '−';

  const valueLimitTitle = t('valueLimitReached');

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: uiTheme.pageBg, color: uiTheme.textPrimary }}>

          style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 19, whiteSpace: 'nowrap', textDecoration: 'none', cursor: 'pointer' }}>
          {t('appName')}
        </a>

        {/* Parameter sliders — the primary controls */}
        <div style={{ display: 'flex', gap: 22, alignItems: 'center', flexWrap: 'wrap' }}>

            ['m', 'm', PARAM_COLORS.m, m, v => changeParam(setM, v), 1, 9],
            ['a', 'b', PARAM_COLORS.a, a, v => changeParam(setA, v), -9, 9],
            ['d', 'd', PARAM_COLORS.d, d, v => changeParam(setD, v), 2, 9],

            </label>

        </div>

        {/* Seed input, max steps, and case actions

            <label

            </label>

                <div className={`ai-card-badge ${p.badgeClass}`}>{p.badge}</div>

            {/* Local-model cards: one per discovered model per endpoint */}
            {localEndpoints.flatMap(url => (localModelsByEndpoint[url] || []).map(m => {
              const provId = `local:${url}:${m.id}`;
              return (
                <button
                  key={provId}
                  className={`ai-provider-card${aiProvider === provId ? ' selected' : ''}`}
                  onClick={() => { setStoredProvider(provId); setAiProvider(provId); }}
                >
                  <div className="ai-card-title">{m.label}</div>
                  <div className="ai-card-desc" style={{ wordBreak: 'break-all' }}>Local at {url}</div>
                  <div className="ai-card-badge ai-badge-local">Local</div>
                </button>
              );
            }))}
          </div>

          {/* Key entry: shown when a cloud provider is selected */}
          {AI_CLOUD_PROVIDERS.find(p => p.id === aiProvider) && (() => {
            const prov = AI_CLOUD_PROVIDERS.find(p => p.id === aiProvider);
            const stored = getStoredKey(prov.id);
            return (
              <div className="ai-key-section">
                <input
                  type="password"
                  placeholder={prov.placeholder}
                  defaultValue={stored ? '••••••••••••••••' : ''}
                  onFocus={e => { if (e.target.value.startsWith('•')) e.target.value = ''; }}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      const v = e.target.value.trim();
                      if (v && !v.startsWith('•')) setStoredKey(prov.id, v);
                      setAiModalOpen(false);
                    } else if (e.key === 'Escape') {
                      setAiModalOpen(false);
                    }
                  }}
                  onBlur={e => {

                    if (v && !v.startsWith('•')) setStoredKey(prov.id, v);

                />
                <div className="ai-key-hint" dangerouslySetInnerHTML={{ __html: prov.keyHint }} />

              </div>

              return (
                <div key={url} className="ai-endpoint-list-item">
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>

                  <button

      {/* ── INTEGER OVERFLOW overlay ── */}

          position: 'absolute', inset: 0, zIndex: 20,

          </div>
          <div style={{ color: '#ff8866', fontSize: 16, marginTop: 20, textAlign: 'center' }}>
            {t('startingValueExceeded', {
              start: formatValue(overflow.start),
              max: formatValue(MAX_VAL),
              steps: overflow.steps,
            }).split(String(formatValue(overflow.start))).reduce((acc, part, idx, arr) => {
              if (idx === arr.length - 1) return [...acc, part];
              return [...acc, part, <strong key={idx}>{formatValue(overflow.start)}</strong>];

          </div>
          <div style={{ color: '#aabbd0', fontSize: 13, marginTop: 10, textAlign: 'center', maxWidth: 560 }}>
            {t('valueLimitExplanation', { maxValue: formatValue(overflow.maxValue) }).split(String(formatValue(overflow.maxValue))).reduce((acc, part, idx, arr) => {

          </div>
          <button onClick={() => setOverflow(null)} style={{

          onPointerDown={handleCanvasPointerDown}

        <div style={{

            display: 'inline-flex',
            alignItems: 'center',
            gap: 6,
            background: uiTheme.overlayBgSoft,
            border: `1px solid ${uiTheme.border}`,
            color: uiTheme.textPrimary,
            borderRadius: 6,
            padding: '6px 11px',
            fontSize: 14,
          }}>
            <input
              type="checkbox"
              checked={showGrid}
              onChange={e => setShowGrid(e.target.checked)}
            />
            {t('grid')}
          </label>
          <label style={{
            display: 'inline-flex',
            alignItems: 'center',
            gap: 6,
            background: uiTheme.overlayBgSoft,
            border: `1px solid ${uiTheme.border}`,
            color: uiTheme.textPrimary,
            borderRadius: 6,
            padding: '6px 11px',
            fontSize: 14,
          }}>
            <input
              type="checkbox"
              checked={useLightTheme}
              onChange={e => setUseLightTheme(e.target.checked)}
            />
            {t('lightTheme')}
          </label>
        </div>

        {/* Visible-steps control retired in Revision 2 — "max steps" now lives in the top control bar, next to the seed input. */}

        {/* Data Table Overlay */}
        {showDataTable && (
          <div ref={dataTablePanelRef} style={{
            position: 'fixed',
            top: dataTableRect.top,
            left: dataTableRect.left,
            width: dataTableRect.width,
            height: dataTableRect.height,
            background: uiTheme.overlayBg,
            border: `2px solid ${uiTheme.borderStrong}`,
            borderRadius: 8,
            boxShadow: '0 4px 20px rgba(0,0,0,0.7)',
            display: 'flex',
            flexDirection: 'column',
            overflow: 'hidden',
            zIndex: 20,
            resize: 'both',
            minWidth: 540,
            minHeight: 320,
          }}>
            <div
              onPointerDown={startDataTableDrag}
              style={{
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                padding: '12px 12px 10px',
                cursor: dataTableDragRef.current ? 'grabbing' : 'grab',
                userSelect: 'none',
                touchAction: 'none',
              }}>
              <span style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 14 }}>{t('cases')}</span>
              <div style={{ display: 'flex', gap: 8 }}>
                <button
                  onPointerDown={e => e.stopPropagation()}
                  onClick={downloadCasesTable}
                  style={{
                    background: 'linear-gradient(135deg, #2f7a44 0%, #49a95f 100%)',
                    border: 'none',
                    color: 'white',
                    borderRadius: 4,
                    padding: '4px 12px',
                    fontSize: 11,
                    fontWeight: 'bold',
                    cursor: 'pointer',
                  }}>
                  💾 Download Cases
                </button>
                <button
                  onPointerDown={e => e.stopPropagation()}
                  onClick={() => setShowDataTable(false)}
                  style={{
                    background: 'transparent',
                    border: `1px solid ${uiTheme.borderStrong}`,
                    color: uiTheme.textMuted,
                    borderRadius: 4,
                    padding: '2px 8px',
                    fontSize: 11,
                    cursor: 'pointer'
                  }}>
                  {t('close')}
                </button>
              </div>
            </div>
            <div style={{ flex: 1, overflow: 'auto', padding: '0 12px 12px' }}>
              <div style={{ color: uiTheme.textMuted, fontSize: 11, lineHeight: 1.45, marginBottom: 10 }}>
                {t('casesExplanation')}
              </div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 12, marginBottom: 6 }}>{t('recentResults')}</div>
                <table style={{ width: '100%', fontSize: 12, color: uiTheme.textPrimary, borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${uiTheme.borderStrong}` }}>
                      <th style={{ padding: '6px', textAlign: 'left', color: uiTheme.titleText }}>{t('start')}</th>
                      <th style={{ padding: '6px', textAlign: 'left', color: uiTheme.titleText }}>{t('outcome')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('steps')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('peak')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('keep')}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {log.length === 0 ? (
                      <tr>
                        <td colSpan="5" style={{ padding: '8px 6px', color: uiTheme.textMuted }}>{t('noResultsYet')}</td>
                      </tr>
                    ) : log.map((entry, i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${uiTheme.border}` }}>
                        <td style={{ padding: '6px', fontWeight: 'bold' }}>{formatValue(entry.start)}</td>
                        <td style={{ padding: '6px', color: OUTCOME_COLOR[entry.outcome] }}>
                          {t(`outcomes.${entry.outcome}`)}
                        </td>
                        <td style={{ padding: '6px', textAlign: 'right', color: uiTheme.textSecondary }}>{entry.steps}</td>
                        <td style={{ padding: '6px', textAlign: 'right', color: uiTheme.textSecondary }}>{formatValue(entry.maxValue)}</td>
                        <td style={{ padding: '6px', textAlign: 'right' }}>
                          <button
                            type="button"
                            onClick={() => saveCase(entry)}
                            disabled={isCaseSaved(entry)}
                            style={{
                              background: isCaseSaved(entry) ? '#253247' : '#234f2d',
                              border: `1px solid ${isCaseSaved(entry) ? '#445566' : '#2f7a44'}`,
                              color: isCaseSaved(entry) ? '#9ab0c8' : '#dff5e5',
                              borderRadius: 4,
                              padding: '3px 8px',
                              fontSize: 10,
                              cursor: isCaseSaved(entry) ? 'default' : 'pointer',
                            }}>
                            {isCaseSaved(entry) ? t('saved') : t('save')}
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                  <div style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 12 }}>{t('savedCases')}</div>
                  {savedCases.length > 0 && (
                    <button
                      type="button"
                      onClick={() => setSavedCases([])}
                      style={{
                        background: 'transparent',
                        border: `1px solid ${uiTheme.border}`,
                        color: uiTheme.textMuted,
                        borderRadius: 4,
                        padding: '2px 8px',
                        fontSize: 10,
                      }}>
                      {t('clearSaved')}
                    </button>
                  )}
                </div>
                <table style={{ width: '100%', fontSize: 12, color: uiTheme.textPrimary, borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${uiTheme.borderStrong}` }}>
                      <th style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.m }}>m</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.a }}>b</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.d }}>d</th>
                      <th style={{ padding: '6px', textAlign: 'left', color: uiTheme.titleText }}>{t('start')}</th>
                      <th style={{ padding: '6px', textAlign: 'left', color: uiTheme.titleText }}>{t('outcome')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('steps')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('peak')}</th>
                      <th style={{ padding: '6px', textAlign: 'right', color: uiTheme.titleText }}>{t('remove')}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {savedCases.length === 0 ? (
                      <tr>
                        <td colSpan="8" style={{ padding: '8px 6px', color: uiTheme.textMuted }}>{t('noSavedCasesYet')}</td>
                      </tr>
                    ) : savedCases.map(entry => (
                      <tr key={entry.key} style={{ borderBottom: `1px solid ${uiTheme.border}` }}>
                        <td style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.m }}>{entry.m}</td>
                        <td style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.a }}>{entry.a}</td>
                        <td style={{ padding: '6px', textAlign: 'right', color: PARAM_COLORS.d }}>{entry.d}</td>
                        <td style={{ padding: '6px', fontWeight: 'bold' }}>{formatValue(entry.start)}</td>
                        <td style={{ padding: '6px', color: OUTCOME_COLOR[entry.outcome] }}>{t(`outcomes.${entry.outcome}`)}</td>
                        <td style={{ padding: '6px', textAlign: 'right', color: uiTheme.textSecondary }}>{entry.steps}</td>
                        <td style={{ padding: '6px', textAlign: 'right', color: uiTheme.textSecondary }}>{formatValue(entry.maxValue)}</td>
                        <td style={{ padding: '6px', textAlign: 'right' }}>
                          <button
                            type="button"
                            onClick={() => removeSavedCase(entry.key)}
                            style={{
                              background: 'transparent',
                              border: `1px solid ${uiTheme.border}`,
                              color: uiTheme.textMuted,
                              borderRadius: 4,
                              padding: '3px 8px',
                              fontSize: 10,
                            }}>
                            {t('remove')}
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ── AI Chat Panel ── */}
        <div style={{
          width: 320, background: uiTheme.panelBg, borderLeft: `1px solid ${uiTheme.border}`,
          display: 'flex', flexDirection: 'column', flexShrink: 0, order: 2,
        }}>
          <div style={{
            padding: '8px 12px', borderBottom: `1px solid ${uiTheme.border}`,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8
          }}>
            <div style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 13, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {(() => {
                const local = parseLocalProvider(aiProvider);
                if (local) return `🪢 ${local.model}`;
                const cloud = AI_CLOUD_PROVIDERS.find(p => p.id === aiProvider);
                if (cloud) return `🪢 ${cloud.title}`;
                return '🪢 AI Chat';
              })()}
            </div>
            <button
              onClick={() => setAiModalOpen(true)}
              style={{
                background: 'transparent', border: `1px solid ${uiTheme.border}`,
                color: uiTheme.textSecondary, borderRadius: 4, padding: '3px 8px',
                fontSize: 10, cursor: 'pointer',
              }}
              title="Choose AI model / enter API key"
            >🤖 AI</button>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '8px 10px', fontSize: 12, lineHeight: 1.5 }}>
            {chatMessages.map((msg, i) => (
              <div key={i} style={{
                marginBottom: 10,
                textAlign: msg.role === 'user' ? 'right' : 'left',
              }}>
                <span style={{
                  display: 'inline-block', maxWidth: '85%',
                  background: msg.role === 'user' ? '#1e44aa' : uiTheme.surfaceBg,
                  color: msg.role === 'user' ? '#ddeeff' : uiTheme.textSecondary,
                  borderRadius: msg.role === 'user' ? '12px 12px 2px 12px' : '12px 12px 12px 2px',
                  padding: '6px 10px',
                  whiteSpace: 'pre-wrap',
                }}>
                  {msg.content}
                </span>
              </div>
            ))}
            {chatLoading && (
              <div style={{ color: uiTheme.textMuted, fontStyle: 'italic', fontSize: 11 }}>Athena is thinking…</div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* Input */}
          <div style={{ padding: '8px', borderTop: `1px solid ${uiTheme.border}`, display: 'flex', gap: 6 }}>
            <input
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendChat()}
              placeholder={(() => {
                const local = parseLocalProvider(aiProvider);
                if (local) return `Ask ${local.model}…`;
                const cloud = AI_CLOUD_PROVIDERS.find(p => p.id === aiProvider);
                if (cloud) return `Ask ${cloud.title}…`;
                return 'Ask AI… (choose a model via 🤖 AI Setup)';
              })()}
              style={{
                flex: 1, background: uiTheme.surfaceBg, border: `1px solid ${uiTheme.border}`,
                color: uiTheme.textPrimary, borderRadius: 4, padding: '5px 8px', fontSize: 12,
              }}
            />
            <button onClick={sendChat} disabled={chatLoading} style={{
              background: chatLoading ? '#112' : '#1e44aa', border: 'none',
              color: 'white', borderRadius: 4, padding: '5px 10px', fontSize: 12, cursor: 'pointer',
            }}>Send</button>
          </div>
        </div>

        {/* ── Scoreboard ── */}
        <div style={{
          width: 440, background: uiTheme.panelBg, borderLeft: `1px solid ${uiTheme.border}`,
          display: 'flex', flexDirection: 'column', flexShrink: 0, order: 1,
          overflowX: 'hidden', overflowY: 'auto', padding: '10px 12px',
        }}>
          <div style={{
            color: uiTheme.titleText, fontWeight: 'bold', fontSize: 16,
            textAlign: 'center', letterSpacing: 2, marginBottom: 10,
            cursor: 'help',
          }}
          title="Click any number in the grids to add it to your exploration. Highlighted numbers show which values you've already tested.">{t('dataReferenceGrids')}</div>

          <div style={{
            marginBottom: 12,
            padding: '8px',
            background: uiTheme.panelBgAlt,
            border: `1px solid ${uiTheme.border}`,
            borderRadius: 6,
          }}>
            <div style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 13, marginBottom: 8, letterSpacing: 1 }}>
              {t('gridWindow')}
            </div>
            {/* Revision 7: jump to the block of 100 containing a typed value (and ring that cell) */}
            <label title={t('findHelp')} style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 8, fontSize: 12, color: uiTheme.textSecondary, whiteSpace: 'nowrap' }}>
              <span>{t('findLabel')}</span>
              <input
                type="text" inputMode="numeric" value={findVal}
                onChange={e => setFindVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && jumpToBlock()}
                placeholder="e.g. 1,234"
                style={{
                  flex: 1, minWidth: 0, background: uiTheme.surfaceBgMuted, border: `1px solid ${uiTheme.borderStrong}`,
                  color: uiTheme.textPrimary, borderRadius: 4, padding: '6px 8px', fontSize: 12, fontFamily: 'monospace',
                }}
              />
            </label>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 76px', gap: 6, marginBottom: 6 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <span style={{ color: uiTheme.textSecondary, fontSize: 10 }}>{t('startAt')}</span>
                <div style={{
                  width: '100%',
                  background: uiTheme.surfaceBgMuted,
                  border: `1px solid ${uiTheme.border}`,
                  color: uiTheme.textPrimary,
                  borderRadius: 4,
                  padding: '6px 8px',
                  fontSize: 11,
                  fontWeight: 'bold',
                  letterSpacing: 0.5,
                  cursor: 'default',
                  userSelect: 'none',
                }}>
                  {formatValue(gridStart)}
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <span style={{ color: uiTheme.textSecondary, fontSize: 10 }}>{t('blocks')}</span>
                <div style={{
                  width: '100%',
                  background: uiTheme.surfaceBgMuted,
                  border: `1px solid ${uiTheme.border}`,
                  color: uiTheme.textPrimary,
                  borderRadius: 4,
                  padding: '6px 8px',
                  fontSize: 11,
                  fontWeight: 'bold',
                  textAlign: 'center',
                  cursor: 'default',
                  userSelect: 'none',
                }}>
                  {gridCount}
                </div>
              </div>
            </div>
            <div style={{ color: uiTheme.textMuted, fontSize: 10, marginBottom: 6 }}>
              {t('usePreviousNext')}
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button
                type="button"
                onClick={() => { updateGridStart(Math.max(1, gridStart - gridCount * GRID_BLOCK_SIZE)); setHighlightCell(null); }}
                style={{
                  flex: 1,
                  background: uiTheme.surfaceBg,
                  border: `1px solid ${uiTheme.border}`,
                  color: uiTheme.textPrimary,
                  borderRadius: 4,
                  padding: '5px 6px',
                  fontSize: 10,
                }}>
                {t('previous')} {gridCount * GRID_BLOCK_SIZE}
              </button>
              <button
                type="button"
                onClick={() => { updateGridStart(gridStart + gridCount * GRID_BLOCK_SIZE); setHighlightCell(null); }}
                style={{
                  flex: 1,
                  background: uiTheme.surfaceBg,
                  border: `1px solid ${uiTheme.border}`,
                  color: uiTheme.textPrimary,
                  borderRadius: 4,
                  padding: '5px 6px',
                  fontSize: 10,
                }}>
                {t('next')} {gridCount * GRID_BLOCK_SIZE}
              </button>
            </div>
          </div>

          <div style={{
            marginBottom: 12,
            padding: '8px',
            background: uiTheme.panelBgAlt,
            border: `1px solid ${uiTheme.border}`,
            borderRadius: 6,
          }}>
            <div style={{ color: uiTheme.titleText, fontWeight: 'bold', fontSize: 13, marginBottom: 6, letterSpacing: 1 }}>
              {t('recentStarts')}
            </div>
            {log.length === 0 ? (
              <div style={{ color: uiTheme.textMuted, fontSize: 11, lineHeight: 1.4 }}>
                {t('largeValuesAppear')}
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {log.slice(0, 8).map((entry, i) => (
                  <button
                    key={`${entry.start}-${entry.steps}-${i}`}
                    type="button"
                    onClick={() => {
                      updateGridStart(entry.start);
                      addNumberVal(entry.start);
                    }}
                    style={{
                      display: 'grid',
                      gridTemplateColumns: '1fr auto',
                      gap: 6,
                      alignItems: 'center',
                      width: '100%',
                      background: uiTheme.surfaceBg,
                      border: `1px solid ${uiTheme.border}`,
                      color: uiTheme.textPrimary,
                      borderRadius: 4,
                      padding: '5px 7px',
                      fontSize: 11,
                      textAlign: 'left',
                    }}>
                    <span>{formatValue(entry.start)}</span>
                    <span style={{ color: OUTCOME_COLOR[entry.outcome], fontSize: 10 }}>{t(`outcomes.${entry.outcome}`)}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          {Array.from({ length: gridCount }, (_, block) => {
            const blockStart = gridStart + block * GRID_BLOCK_SIZE;
            const blockEnd = blockStart + GRID_BLOCK_SIZE - 1;
            return (
            <div key={blockStart} style={{ marginBottom: 14 }}>
              <div style={{ color: '#99bbdd', fontSize: 15, fontWeight: 'bold', textAlign: 'center', marginBottom: 6, letterSpacing: 1 }}>
                {formatValue(blockStart)} - {formatValue(blockEnd)}
              </div>
              {/* minmax(0,1fr) lets the 10 columns share the panel width even for big numbers,
                  so the grid never spills off the panel; the cell font shrinks to fit the
                  comma-formatted label (e.g. "11,111") within the resulting cell. */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(10, minmax(0, 1fr))', gap: 3 }}>
                {Array.from({ length: GRID_BLOCK_SIZE }, (_, i) => blockStart + i).map(n => {
                  const hit = visitedNums.has(n);
                  const isFind = (n === highlightCell);
                  const label = formatValue(n);
                  const cellFont = Math.max(7, Math.min(14, Math.floor(58 / String(label).length)));
                  return (
                    <button key={n} type="button" style={{
                      aspectRatio: '1',
                      background: hit ? valColor(n) : '#182840',
                      border: isFind ? '3px solid #ffd54f' : (hit ? '1px solid rgba(255,255,255,0.2)' : '1px solid #1e3566'),
                      borderRadius: 3,
                      position: 'relative',
                      zIndex: isFind ? 2 : 1,
                      boxShadow: isFind ? '0 0 9px 2px rgba(255,213,79,0.65)' : 'none',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: cellFont, fontWeight: 'bold',
                      lineHeight: 1,
                      cursor: 'pointer',
                      padding: 0,
                      overflow: 'hidden',
                      userSelect: 'none',
                      WebkitUserSelect: 'none',
                      color: 'white',
                    }}
                    title={t('addValueTitle', { value: label })}
                    onMouseDown={e => {
                      e.preventDefault();
                      setInputVal(String(n));
                      addNumberVal(n);
                    }}>
                      {label}
                    </button>
                  );
                })}
              </div>
            </div>
          );})}

          <div style={{
            marginTop: 6,
            marginBottom: 8,
            color: '#ff3b30',
            fontSize: 20,
            fontWeight: 700,
            lineHeight: 1.18,
            fontFamily: 'Trebuchet MS, Segoe UI, sans-serif',
          }}>
            {t('useGridControls')}
          </div>

          <div style={{
            marginTop: 'auto',
            borderTop: '1px solid #1e2f55',
            paddingTop: 8,
            color: '#667788',
            fontSize: 11,
            lineHeight: 1.4,
          }}>
            <div>
              {t('colorScale')}
              <span style={{ color: '#4ecb6f', fontWeight: 'bold' }}> {t('green')}</span>
              {' '}→ 
              <span style={{ color: '#c4d83f', fontWeight: 'bold' }}> {t('yellow')}</span>
              {' '}→ 
              <span style={{ color: '#f0a23a', fontWeight: 'bold' }}> {t('orange')}</span>
              {' '}→ 
              <span style={{ color: '#e45a4f', fontWeight: 'bold' }}> {t('red')}</span>
            </div>
            <div style={{ marginTop: 4 }}>
              {t('greenShows')}
            </div>
            <div style={{ marginTop: 2 }}>
              {t('glowingNodes')}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
